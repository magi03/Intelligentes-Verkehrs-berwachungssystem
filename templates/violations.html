<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Blitzer-Akte | Smart Traffic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📸</text></svg>">
</head>
<body class="bg-body-tertiary">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-danger"><i class="bi bi-camera-fill"></i> Offizielle Blitzer-Akte</h2>
            <a href="/" class="btn btn-outline-info"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>

        <div class="row g-4">
            {% for photo in photos %}
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm bg-dark">
                    <img src="{{ photo.image_path }}" class="card-img-top" alt="Blitzer Foto" style="height: 250px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title text-danger">Spur: {{ photo.lane_name }}</h5>
                        <p class="card-text text-secondary mb-1"><i class="bi bi-clock"></i> {{ photo.timestamp }}</p>
                        <p class="card-text"><small class="text-muted">Datei: {{ photo.image_path.split('/')[-1] }}</small></p>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-center py-5">
                <h4 class="text-secondary">Noch keine Verstöße aufgezeichnet.</h4>
                <p class="text-muted">Sobald der Jetson Blitzer-Fotos hochlädt, erscheinen sie hier.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
